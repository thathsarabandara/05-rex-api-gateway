version: '3.8'

services:
  gateway:
    build: .
    container_name: rex-gateway
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - LOG_LEVEL=info
      - AUTH_SERVER_URL=http://host.docker.internal:8000
      - IDENTITY_SERVER_URL=http://host.docker.internal:8001
      - WEB_DASHBOARD_URL=http://localhost:5173
      - ALLOWED_ORIGINS=http://localhost:5173
      - JWT_AUTH_SECRET=${JWT_AUTH_SECRET:-your_auth_secret_key_here}
      - JWT_IDENTITY_SECRET=${JWT_IDENTITY_SECRET:-your_identity_secret_key_here}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
      - REQUEST_TIMEOUT=30000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped