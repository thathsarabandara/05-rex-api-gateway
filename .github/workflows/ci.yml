name: Node.js CI/CD — API Gateway

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  checkout:
    name: "1 · Checkout"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

  environment:
    name: "2 · Environment"
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Set up Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Print environment versions
        run: |
          node --version
          npm --version

  install-dependencies:
    name: "3 · Install Dependencies"
    runs-on: ubuntu-latest
    needs: environment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install npm packages
        run: npm ci
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  lint:
    name: "4 · Lint"
    runs-on: ubuntu-latest
    needs: install-dependencies
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - name: Security scan — npm audit
        run: npm audit --audit-level=high || true
      - name: Lint — ESLint
        run: npm run lint

  test:
    name: "5 · Test"
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - name: Run test suite
        run: npm run test:coverage
        env:
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379/3
          AUTH_SERVICE_URL: http://127.0.0.1:8001
          ROBOT_SERVICE_URL: http://127.0.0.1:8002
          NOTIFICATION_SERVICE_URL: http://127.0.0.1:8003
          TELEMETRY_SERVICE_URL: http://127.0.0.1:8004
          VISION_SERVICE_URL: http://127.0.0.1:8005
          EVENT_SERVICE_URL: http://127.0.0.1:8006
          VOICE_SERVICE_URL: http://127.0.0.1:8007
          AGENT_SERVICE_URL: http://127.0.0.1:8008
          MEMORY_SERVICE_URL: http://127.0.0.1:8009
          USER_JWT_SECRET_KEY: test-user-jwt-secret-must-be-long-enough-key-value-here
          ROBOT_JWT_SECRET_KEY: test-robot-jwt-secret-must-be-long-enough-key-value-here
          INTERNAL_SERVICE_TOKEN: test-internal-service-token
          ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
          ALLOWED_HOSTS: localhost,127.0.0.1

  build:
    name: "6 · Build"
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

  push:
    name: "7 · Push"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=main
      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
